<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Pomelo Context Workbook logo</title>
  <desc id="desc">A pomelo-shaped mark made from workbook sheets and data slices.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; }
    .ink { fill: #172a2a; }
    .muted { fill: #53615a; }
    .leaf { fill: #2f8f83; }
    .rind { fill: #f4d079; }
    .flesh { fill: #f7f0cf; }
    .slice { stroke: #172a2a; stroke-width: 5; stroke-linecap: round; }
    .cell { stroke: #d8c991; stroke-width: 2; }
  </style>
  <rect width="960" height="280" rx="34" fill="#fbfaf6"/>
  <g transform="translate(78 38)">
