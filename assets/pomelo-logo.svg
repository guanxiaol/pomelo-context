    <path d="M160 56 C194 83 204 131 183 169 C159 214 94 226 51 189 C10 153 8 87 46 52 C78 22 125 24 160 56Z" class="rind"/>
    <path d="M157 67 C184 91 191 130 174 162 C153 199 101 208 65 178 C31 149 30 96 60 68 C86 44 126 45 157 67Z" class="flesh"/>
    <path d="M67 78 C92 102 99 137 81 173" fill="none" class="slice"/>
    <path d="M111 55 C113 93 113 141 104 194" fill="none" class="slice"/>
    <path d="M155 78 C134 103 126 139 136 176" fill="none" class="slice"/>
    <path d="M57 112 H174" fill="none" class="slice"/>
    <path d="M67 151 H164" fill="none" class="slice"/>
    <rect x="78" y="100" width="22" height="20" rx="4" fill="#ffffff" class="cell"/>
    <rect x="112" y="100" width="22" height="20" rx="4" fill="#ffffff" class="cell"/>
    <rect x="119" y="139" width="22" height="20" rx="4" fill="#ffffff" class="cell"/>
  </g>
  <g transform="translate(304 80)">
    <text x="0" y="0" class="ink" font-size="54" font-weight="850">Pomelo</text>
    <text x="0" y="56" class="ink" font-size="42" font-weight="760">Context Workbook</text>
    <text x="0" y="100" class="muted" font-size="22" font-weight="650">Low-token workbooks for agent context</text>
    <text x="0" y="132" class="muted" font-size="22" font-weight="650">低 Token、可切片、可归档的 AI 上下文工作簿</text>
  </g>
